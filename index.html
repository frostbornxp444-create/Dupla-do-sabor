<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDV Dupla do Sabor</title>

<style>
body{font-family:Arial;margin:0;background:#f1f1f1}
.topo{background:#28a745;color:#fff;padding:15px;text-align:center}
.menu button{margin:5px;padding:12px;border:none;border-radius:6px}
.container{padding:15px}
.card{background:#fff;padding:10px;margin:5px 0;border-radius:8px}
input{padding:10px;margin:5px;width:90%}
button{cursor:pointer}
.total{font-size:20px;font-weight:bold}
</style>
</head>

<body>

<div class="topo">
<h2>Dupla do Sabor</h2>
<div class="menu">
<button onclick="tela('caixa')">Caixa</button>
<button onclick="tela('estoque')">Estoque</button>
<button onclick="tela('relatorio')">Relatório</button>
</div>
</div>

<div class="container" id="app"></div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let vendas = JSON.parse(localStorage.getItem("vendas")) || [];
let carrinho = [];

function salvar(){
 localStorage.setItem("produtos", JSON.stringify(produtos));
 localStorage.setItem("vendas", JSON.stringify(vendas));
}

function tela(t){

if(t==="estoque"){
 app.innerHTML=`
 <h3>Estoque</h3>

 <input id="nome" placeholder="Nome">
 <input id="codigo" placeholder="Código">
 <input id="preco" placeholder="Valor">
 <input id="qtd" placeholder="Quantidade">

 <button onclick="addProduto()">Salvar Produto</button>

 <div id="lista"></div>`;
 renderProdutos();
}

if(t==="caixa"){
 app.innerHTML=`
 <h3>Caixa</h3>

 <input id="cod" placeholder="Código do produto">
 <button onclick="addCarrinho()">Adicionar</button>

 <div id="carrinho"></div>

 <div class="total" id="total"></div>

 <h3>Pagamento</h3>
 <button onclick="pag('dinheiro')">Dinheiro</button>
 <button onclick="pag('cartao')">Cartão</button>
 <button onclick="pag('pix')">Pix</button>

 <div id="pagArea"></div>

 <button onclick="finalizar()">Finalizar Venda</button>
 <button onclick="limpar()">Cancelar</button>
 `;
 renderCarrinho();
}

if(t==="relatorio"){
 let total=0;
 vendas.forEach(v=> total+=v.total);

 app.innerHTML=`
 <h3>Relatório</h3>
 <p>Total de vendas: ${vendas.length}</p>
 <p>Faturamento: R$ ${total}</p>

 <h4>Histórico</h4>
 <div id="hist"></div>
 `;

 let hist="";
 vendas.forEach(v=>{
  hist+=`<div class="card">Venda: R$ ${v.total}</div>`;
 });

 document.getElementById("hist").innerHTML=hist;
}
}

// ESTOQUE
function addProduto(){
 let nome=nome.value;
 let codigo=codigo.value;
 let preco=parseFloat(preco.value);
 let qtd=parseInt(qtd.value);

 if(!nome || !codigo || !preco || !qtd){
  alert("Preencha tudo");
  return;
 }

 produtos.push({nome,codigo,preco,qtd});
 salvar();
 renderProdutos();
}

function renderProdutos(){
 let div=document.getElementById("lista");
 div.innerHTML="";

 produtos.forEach((p,i)=>{
  div.innerHTML+=`
  <div class="card">
   ${p.nome} | ${p.codigo} | R$ ${p.preco} | Qtd: ${p.qtd}
   <br>
   <button onclick="editar(${i})">Editar</button>
   <button onclick="excluir(${i})">Excluir</button>
  </div>`;
 });
}

function excluir(i){
 produtos.splice(i,1);
 salvar();
 renderProdutos();
}

function editar(i){
 let p=produtos[i];

 let novoNome=prompt("Nome:",p.nome);
 let novoPreco=prompt("Preço:",p.preco);
 let novaQtd=prompt("Quantidade:",p.qtd);

 p.nome=novoNome;
 p.preco=parseFloat(novoPreco);
 p.qtd=parseInt(novaQtd);

 salvar();
 renderProdutos();
}

// CAIXA
function addCarrinho(){
 let c=cod.value;
 let p=produtos.find(x=>x.codigo===c);

 if(!p){alert("Produto não encontrado");return;}
 if(p.qtd<=0){alert("Sem estoque");return;}

 let item=carrinho.find(x=>x.codigo===c);

 if(item){item.qtd++;}
 else carrinho.push({...p,qtd:1});

 p.qtd--;
 salvar();
 renderCarrinho();
}

function renderCarrinho(){
 let div=document.getElementById("carrinho");
 div.innerHTML="";

 let total=0;

 carrinho.forEach((i,idx)=>{
  div.innerHTML+=`
  <div class="card">
   ${i.nome} x${i.qtd} = R$ ${i.preco*i.qtd}
   <button onclick="menos(${idx})">-</button>
  </div>`;
  total+=i.preco*i.qtd;
 });

 document.getElementById("total").innerText="Total: R$ "+total;
}

function menos(i){
 let item=carrinho[i];
 let p=produtos.find(x=>x.codigo===item.codigo);

 item.qtd--;
 p.qtd++;

 if(item.qtd<=0) carrinho.splice(i,1);

 salvar();
 renderCarrinho();
}

function limpar(){
 carrinho=[];
 renderCarrinho();
}

// PAGAMENTO
function pag(tipo){
 let area=document.getElementById("pagArea");

 if(tipo==="dinheiro"){
  area.innerHTML=`
  <input id="pago" placeholder="Valor pago">
  <button onclick="troco()">Calcular troco</button>
  <p id="troco"></p>`;
 }

 if(tipo==="pix"){
  area.innerHTML=`<p>Pix: 51920021285</p>`;
 }

 if(tipo==="cartao"){
  area.innerHTML=`<p>Cartão selecionado</p>`;
 }
}

function troco(){
 let pago=parseFloat(document.getElementById("pago").value);
 let total=carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);

 document.getElementById("troco").innerText="Troco: R$ "+(pago-total);
}

// FINALIZAR
function finalizar(){
 let total=carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);

 vendas.push({total,data:new Date().toLocaleString()});

 salvar();

 alert("Venda finalizada");

 carrinho=[];
 tela("caixa");
}

// INICIO
tela("caixa");

</script>

</body>
</html>
