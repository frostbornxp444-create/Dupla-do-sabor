<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dupla do Sabor</title>

<style>
body{
 font-family: Arial;
 margin:0;
 background:#f5f5f5;
}

.topo{
 background:#111;
 color:#fff;
 padding:15px;
 text-align:center;
}

.menu button{
 margin:5px;
 padding:10px;
 font-size:16px;
}

.container{
 padding:15px;
}

input{
 padding:10px;
 margin:5px;
 width:90%;
}

button{
 padding:10px;
 margin:5px;
 font-size:16px;
}

.card{
 background:#fff;
 padding:10px;
 margin:5px 0;
 border-radius:8px;
}
</style>

</head>
<body>

<div class="topo">
 <h2>Dupla do Sabor</h2>
 <div class="menu">
  <button onclick="tela('caixa')">Caixa</button>
  <button onclick="tela('estoque')">Estoque</button>
 </div>
</div>

<div class="container" id="app"></div>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let carrinho = [];

function salvar(){
 localStorage.setItem("produtos", JSON.stringify(produtos));
}

function tela(t){
 if(t==="estoque"){
  document.getElementById("app").innerHTML = `
   <h3>Estoque</h3>

   <input id="nome" placeholder="Nome do produto">
   <input id="codigo" placeholder="Código">
   <input id="preco" placeholder="Valor">

   <button onclick="addProduto()">Adicionar Produto</button>

   <div id="listaProdutos"></div>
  `;
  renderProdutos();
 }

 if(t==="caixa"){
  document.getElementById("app").innerHTML = `
   <h3>Caixa</h3>

   <input id="codigoVenda" placeholder="Código do produto">
   <button onclick="addCarrinho()">Adicionar</button>

   <div id="carrinho"></div>

   <h2 id="total">Total: 0</h2>

   <button onclick="finalizar()">Finalizar</button>
  `;
  renderCarrinho();
 }
}

function addProduto(){
 let nome = document.getElementById("nome").value;
 let codigo = document.getElementById("codigo").value;
 let preco = parseFloat(document.getElementById("preco").value);

 if(!nome || !codigo || !preco){
  alert("Preencha tudo");
  return;
 }

 produtos.push({nome, codigo, preco});
 salvar();
 renderProdutos();
}

function renderProdutos(){
 let div = document.getElementById("listaProdutos");
 div.innerHTML = "";

 produtos.forEach(p=>{
  div.innerHTML += `
   <div class="card">
    ${p.nome} - ${p.codigo} - R$ ${p.preco}
   </div>
  `;
 });
}

function addCarrinho(){
 let codigo = document.getElementById("codigoVenda").value;
 let p = produtos.find(x=>x.codigo===codigo);

 if(!p){
  alert("Produto não encontrado");
  return;
 }

 carrinho.push(p);
 renderCarrinho();
}

function renderCarrinho(){
 let div = document.getElementById("carrinho");
 div.innerHTML = "";

 let total = 0;

 carrinho.forEach(p=>{
  div.innerHTML += `
   <div class="card">
    ${p.nome} - R$ ${p.preco}
   </div>
  `;
  total += p.preco;
 });

 document.getElementById("total").innerText = "Total: R$ " + total;
}

function finalizar(){
 alert("Venda finalizada");
 carrinho = [];
 renderCarrinho();
}

tela('caixa');
</script>

</body>
</html>
