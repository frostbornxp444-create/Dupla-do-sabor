<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dupla do Sabor</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h1>Dupla do Sabor - Caixa</h1>

<input id="codigo" placeholder="Código do produto">
<button onclick="add()">Adicionar</button>

<h2>Carrinho</h2>
<div id="lista"></div>

<h3 id="total">Total: 0</h3>

<h3>Pagamento</h3>
<button onclick="setPag('dinheiro')">Dinheiro</button>
<button onclick="setPag('cartao')">Cartão</button>
<button onclick="setPag('pix')">Pix</button>

<div id="areaPagamento"></div>

<br><br>
<button onclick="finalizar()">Finalizar Venda</button>

<script>
let produtos = [
 {codigo:"170991", nome:"Marmita 10", preco:10},
 {codigo:"170992", nome:"Marmita 15", preco:15}
];

let carrinho = [];
let pag = "";

function add(){
 let c = document.getElementById("codigo").value;
 let p = produtos.find(x=>x.codigo===c);

 if(!p){
  alert("Produto não encontrado");
  return;
 }

 carrinho.push(p);
 document.getElementById("codigo").value="";
 render();
}

function render(){
 let lista = document.getElementById("lista");
 lista.innerHTML = "";

 let total = 0;

 carrinho.forEach(i=>{
  lista.innerHTML += i.nome + " - R$ " + i.preco + "<br>";
  total += i.preco;
 });

 document.getElementById("total").innerText = "Total: R$ " + total;
}

function setPag(tipo){
 pag = tipo;

 let area = document.getElementById("areaPagamento");

 if(tipo === "dinheiro"){
  area.innerHTML = `
   <input id="pago" placeholder="Valor pago">
   <button onclick="calcTroco()">Calcular troco</button>
   <p id="troco"></p>
  `;
 }

 if(tipo === "cartao"){
  area.innerHTML = `<p>Pagamento em cartão selecionado</p>`;
 }

 if(tipo === "pix"){
  area.innerHTML = `<p>Pix: 51920021285</p>`;
 }
}

function calcTroco(){
 let pago = parseFloat(document.getElementById("pago").value);
 let total = carrinho.reduce((s,i)=>s+i.preco,0);

 if(isNaN(pago)){
  alert("Digite o valor pago");
  return;
 }

 document.getElementById("troco").innerText =
  "Troco: R$ " + (pago - total);
}

function finalizar(){
 if(carrinho.length === 0){
  alert("Carrinho vazio");
  return;
 }

 alert("Venda finalizada!");

 carrinho = [];
 document.getElementById("areaPagamento").innerHTML = "";
 render();
}
</script>

</body>
</html>
